# The POSIX seams (pid_alive, path canonicalization, the hook runner) were developed on one
# Windows laptop — the matrix is the proof they hold elsewhere.
name: ci
on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-extras
      - run: uv run pytest -q
